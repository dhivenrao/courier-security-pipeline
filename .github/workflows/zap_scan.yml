name: OWASP ZAP Scan

on:
  push:
    branches:
      - main

jobs:
  zap_scan:
    runs-on: self-hosted

    steps:
      - name: Prepare Report Folder
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: |
          New-Item -ItemType Directory -Force -Path "C:\zap-reports"

      - name: Run OWASP ZAP Docker Scan
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        continue-on-error: true
        run: |
          docker run --rm -v "C:\zap-reports:/zap/wrk/:rw" ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://host.docker.internal:8080/courier/ -r zap-report.html -I

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: C:/zap-reports/zap-report.html
